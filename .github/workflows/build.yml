name: Build
on:
  - push
  - workflow_dispatch
jobs:
  get-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4
      - id: get-info
        name: Get info
        run: python get-info.py
    outputs:
      url: ${{ steps.get-info.outputs.url }}
      commit: ${{ steps.get-info.outputs.commit }}
  build-arch-pkg:
    needs: get-info
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
      - name: Checkout self
        uses: actions/checkout@v4
      - name: Build
        run: >
          docker run
          --pull always
          --env URL=${{ needs.get-info.outputs.url }}
          --env COMMIT=${{ needs.get-info.outputs.commit }}
          --mount type=bind,src=$(pwd),dst=/mnt/repo
          --workdir /mnt/repo
          archlinux:base-devel
          ./build.sh
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: arch-pkg
          path: pkg/*.pkg.*
  notify:
    needs:
      - get-info
      - build-arch-pkg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4
      - name: Install dependency
        run: |
          set -x
          sudo apt-get update
          sudo apt-get --assume-yes dist-upgrade
          sudo apt-get --assume-yes install python3-git python3-python-telegram-bot
      - name: Notify
        run: python notify.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          URL: ${{ needs.get-info.outputs.url }}
          COMMIT: ${{ needs.get-info.outputs.commit }}
          SUMMARY_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
