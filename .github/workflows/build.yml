name: Build
on:
  - push
  - workflow_dispatch
jobs:
  get-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4
      - id: get-info
        name: Get info
        run: python get-info.py
    outputs:
      version: ${{ steps.get-info.outputs.version }}
  build-arch-pkg:
    needs: get-info
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192
          swap-size-mb: 49152
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
      - name: Checkout self
        uses: actions/checkout@v4
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@v2
      - name: Build
        run: >
          docker run
          --cpuset-cpus=0
          --env VERSION=${{ needs.get-info.outputs.version }}
          --mount type=bind,src=$(pwd),dst=/mnt/repo
          --pull always
          --tmpfs /tmp
          --ulimit nofile=1024:524288
          --workdir /mnt/repo
          archlinux:base-devel
          ./build.sh
          ||
          (df && exit 1)
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: arch-pkg
          path: pkg/*.pkg.*
  notify:
    needs:
      - get-info
      - build-arch-pkg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4
      - name: Install dependency
        run: pip install --user --upgrade python-telegram-bot
      - name: Notify
        run: python notify.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          VERSION: ${{ needs.get-info.outputs.version }}
          SUMMARY_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
